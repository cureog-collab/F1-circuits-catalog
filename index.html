<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>F1 Circuits</title>
    <link rel="stylesheet" href="style.css">
    <script type="text/javascript" src="main.js" defer></script>
</head>

<body>
    <nav class="top-nav">
        <input type="text" id="main-search-bar" placeholder="Search for a Grand Prix">
    </nav>
    <main>
        <section class="catalog"> <!-- main.js inserts circuit cards here --></section>
    </main>
    <div class="detail-viewer">
        <div class="detail-grid">  
            <button id="close-detail-viewer">
                X
            </button>
            <div class="d-layout"></div>
            <div class="d-name"></div>
            <div class="d-loc"></div>
            <div class="d-est-yr"></div>
            <div class="d-upcoming-race"></div>
            <div class="d-best-racer"></div>
            <div class="d-last-podium"></div>
        </div>
    </div>
</body>
</html>
